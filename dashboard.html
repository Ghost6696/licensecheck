<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrine License Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.24/jsrsasign-all-min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }

        body {
            background: #09090b;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <!-- Login View -->
    <div id="loginView" class="max-w-md w-full glass p-8 rounded-3xl border border-white/10 shadow-2xl">
        <h1 class="text-2xl font-bold mb-2 text-center">Dashboard Login</h1>
        <p class="text-gray-400 text-sm text-center mb-8">Enter your admin password to continue</p>

        <div class="space-y-4">
            <input type="password" id="adminPassword" placeholder="••••••••"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="login()" id="loginBtn"
                class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                Login
            </button>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="max-w-6xl mx-auto w-full hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                    Shrine License Manager
                </h1>
                <p class="text-gray-500 text-sm mt-1">Cloudflare KV Edition</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="status"
                    class="px-3 py-1 rounded-full text-xs font-medium bg-green-500/20 text-green-400 border border-green-500/30">
                    System Connected
                </div>
                <button onclick="logout()" class="text-xs text-gray-500 hover:text-white underline">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Generator Section -->
            <section class="glass p-6 rounded-2xl border border-white/10 lg:col-span-1">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <span class="mr-2">🔑</span> Generate License
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Shop Domain</label>
                        <input type="text" id="shopDomain" placeholder="example.myshopify.com"
                            class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Private Key (Stored Locally)</label>
                        <textarea id="privateKey" placeholder="-----BEGIN PRIVATE KEY-----..."
                            class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 h-32 text-xs font-mono"></textarea>
                    </div>

                    <button onclick="generateLicense()"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-600/20">
                        Generate & Save
                    </button>
                </div>
            </section>

            <!-- Table Section -->
            <section class="glass p-6 rounded-2xl border border-white/10 lg:col-span-2 overflow-hidden flex flex-col">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <span class="mr-2">📊</span> Active Licenses
                </h2>

                <div class="overflow-x-auto flex-grow">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-gray-400 border-b border-white/5">
                                <th class="pb-3 px-4">Shop Domain</th>
                                <th class="pb-3 px-4">Status</th>
                                <th class="pb-3 px-4 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="licenseTable">
                            <tr>
                                <td colspan="3" class="py-12 text-center text-gray-500 italic">Loading licenses...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal for Result -->
    <div id="resultModal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="max-w-md w-full glass p-8 rounded-3xl border border-white/10">
            <h3 class="text-xl font-bold mb-4">License Generated!</h3>
            <p class="text-sm text-gray-400 mb-4">Copy this into the theme settings for <span id="targetShop"
                    class="text-white font-bold"></span></p>
            <div id="generatedKeyDisplay"
                class="bg-black p-4 rounded-xl font-mono text-xs break-all border border-blue-500/30 text-blue-400 mb-6 max-h-48 overflow-y-auto">
            </div>
            <div class="flex gap-4">
                <button onclick="copyToClipboard()"
                    class="flex-grow bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200">Copy Key</button>
                <button onclick="closeModal()"
                    class="px-6 bg-white/10 font-bold rounded-xl hover:bg-white/20">Close</button>
            </div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('shrine_token');
        const API_URL = 'https://shrine-auther.fantoma.workers.dev'; // Leave blank if hosted on same domain as worker

        // Init
        if (authToken) {
            showDashboard();
        }

        async function login() {
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = 'Verifying...';

            try {
                const res = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('shrine_token', authToken);
                    showDashboard();
                } else {
                    alert('Invalid password');
                }
            } catch (e) {
                alert('Connection error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        }

        function logout() {
            localStorage.removeItem('shrine_token');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.body.classList.remove('flex', 'items-center', 'justify-center');
            fetchLicenses();

            // Auto-load private key if saved in session
            const savedKey = localStorage.getItem('shrine_priv');
            if (savedKey) document.getElementById('privateKey').value = savedKey;
        }

        async function fetchLicenses() {
            try {
                const res = await fetch(`${API_URL}/api/admin/licenses`, {
                    headers: { 'Authorization': authToken }
                });
                if (res.status === 401) return logout();
                const licenses = await res.json();
                renderTable(licenses);
            } catch (e) {
                console.error('Failed to fetch licenses');
            }
        }

        function renderTable(licenses) {
            const table = document.getElementById('licenseTable');
            if (licenses.length === 0) {
                table.innerHTML = '<tr><td colspan="3" class="py-12 text-center text-gray-500 italic">No licenses found in KV.</td></tr>';
                return;
            }

            table.innerHTML = licenses.map(lic => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                    <td class="py-4 px-4 font-medium text-blue-400">
                        ${lic.shop}
                        <div class="text-[10px] text-gray-600 mt-1">${new Date(lic.created).toLocaleString()}</div>
                    </td>
                    <td class="py-4 px-4 text-xs font-mono">
                        <span class="px-2 py-0.5 rounded-full ${lic.status === 'active' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                            ${lic.status.toUpperCase()}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="copyToClipboard('${lic.key}')" title="Copy License Key" class="text-xs bg-white text-black font-bold px-3 py-1.5 rounded hover:bg-gray-200 transition-all">Copy</button>
                            <button onclick="addAlias('${lic.shop}')" title="Link Custom Domain" class="text-xs bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-1.5 rounded transition-all">Alias</button>
                            <button onclick="toggleStatus('${lic.shop}', '${lic.status}')" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded transition-all">
                                ${lic.status === 'active' ? 'Revoke' : 'Activate'}
                            </button>
                            <button onclick="deleteLicense('${lic.shop}')" class="text-xs text-red-500 hover:text-red-400 px-3 py-1.5 rounded">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleStatus(shop, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'revoked' : 'active';
            if (!confirm(`Are you sure you want to ${newStatus === 'revoked' ? 'REVOKE' : 'ACTIVATE'} license for ${shop}?`)) return;

            await fetch(`${API_URL}/api/admin/licenses`, {
                method: 'POST',
                headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ shop, status: newStatus })
            });
            fetchLicenses();
        }

        async function deleteLicense(shop) {
            if (!confirm(`Permanently cancel access for ${shop}? \n\nThis will FULLY DELETE the record and immediately BLOCK the client from using the theme.`)) return;

            await fetch(`${API_URL}/api/admin/licenses`, {
                method: 'DELETE',
                headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ shop })
            });
            fetchLicenses();
        }

        async function generateLicense() {
            const shop = document.getElementById('shopDomain').value.trim();
            const pem = document.getElementById('privateKey').value.trim();

            if (!shop || !pem) return alert('Fill domain and key');

            try {
                // Sign
                const sig = new KJUR.crypto.Signature({ "alg": "SHA256withRSA" });
                sig.init(pem);
                sig.updateString(shop);
                const sigValueBase64 = hextob64(sig.sign());

                // Save to KV via Worker
                const res = await fetch(`${API_URL}/api/admin/licenses`, {
                    method: 'POST',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        shop,
                        key: sigValueBase64,
                        created: new Date().toISOString()
                    })
                });

                if (res.ok) {
                    localStorage.setItem('shrine_priv', pem); // Save key for next time
                    document.getElementById('targetShop').innerText = shop;
                    document.getElementById('generatedKeyDisplay').innerText = sigValueBase64;
                    document.getElementById('resultModal').classList.remove('hidden');
                    fetchLicenses();
                }

            } catch (err) {
                alert('Generation failed');
            }
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
        }

        function copyToClipboard(key) {
            const text = key || document.getElementById('generatedKeyDisplay').innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => alert('Key copied to clipboard!'));
        }

        async function addAlias(primaryShop) {
            const aliasShop = prompt(`Enter custom domain for ${primaryShop}: (e.g. astranovah.com)`);
            if (!aliasShop) return;

            try {
                const res = await fetch(`${API_URL}/api/admin/licenses`, {
                    method: 'POST',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'add_alias', 
                        shop: aliasShop.trim().toLowerCase(), 
                        target: primaryShop 
                    })
                });
                
                if (res.ok) {
                    alert(`Custom domain ${aliasShop} linked to ${primaryShop}!`);
                    fetchLicenses();
                } else {
                    const error = await res.json();
                    alert(`Error: ${error.error}`);
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        }
    </script>
</body>

</html>
